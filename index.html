<!DOCTYPE html>
<html lang="en" data-preset="sera-editorial">
<head>
    <link rel="icon" type="image/svg+xml" href="https://myarcade.pages.dev/joystick.svg">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="74562084-62cf-4203-9e47-1b4fa0d1ecbf"></script>
    <meta property="og:image" content="https://thelectrowizard.github.io/main.jpeg">
    <meta property="og:url" content="https://myarcade.pages.dev/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Arcade">
    <meta name="description" content="Avoid the Blocks • Avoid the Blocks V2 • GeoDash • Microracer • PokeGoLite">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.css">

    <style>
        /* Custom NProgress styling overrides matching Sera design palette colors */
        #nprogress .bar {
            background: hsl(240, 5.9%, 10%) !important;
            height: 3px !important;
        }
        #nprogress .spinner-icon {
            border-top-color: hsl(240, 5.9%, 10%) !important;
            border-left-color: hsl(240, 5.9%, 10%) !important;
        }

        /* --- SHADCN OFFICIAL SERA (EDITORIAL STYLE) TOKENS --- */
        html[data-preset="sera-editorial"] {
            --background: 0 0% 100%;             /* Pure editorial paper white */
            --foreground: 240 10% 3.9%;          /* Deep ink black */
            --card: 0 0% 98%;                    /* Minimal off-white card background */
            --muted-foreground: 240 3.8% 46.1%;  /* Soft graphite gray for metadata */
            --border: 240 5.9% 90%;              /* Light hair-line rule border */
            --muted: 240 4.8% 95.9%;             /* Clean structural track layer */
            --primary: 240 5.9% 10%;             /* Rich black primary ink */
            --primary-foreground: 0 0% 98%;      /* Stark white foreground text */
            --radius: 0.125rem;                  /* Structural, sharp corners matching typography rules */
        }

        :root {
            --font-serif: "Playfair Display", "Georgia", "Times New Roman", serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            font-family: var(--font-sans);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            text-align: center;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- GLOBAL FADE ANIMATION STAGE --- */
        #page-view-wrapper {
            opacity: 0;
            animation: globalFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            z-index: 20;
        }

        #page-view-wrapper.fade-out {
            animation: globalFadeOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes globalFadeIn { to { opacity: 1; } }
        @keyframes globalFadeOut { to { opacity: 0; } }

        /* GitHub Bar Position */
        .header-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
            margin-top: 10px;
        }

        /* --- ADSENSE CONTAINERS WITH MANDATORY 10PT CORNER RADIUS --- */
        .ad-container {
            display: none; 
            background-color: hsl(var(--card));
            border: 1px solid hsl(var(--border));
            border-radius: 10pt; 
            overflow: hidden;
            z-index: 10;
        }

        /* Side Rails (Desktop layout format) */
        .ad-vertical {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 160px;
            height: 600px;
            max-height: 75vh;
        }
        .ad-left { left: 24px; }
        .ad-right { right: 24px; }

        /* Top and Bottom banner formats */
        .ad-horizontal {
            width: 100%;
            max-width: 728px;
            height: 90px;
            margin: 16px auto;
        }
        
        /* Bottom Sticky Layout Ad specific to tracking view modes */
        .ad-bottom-sticky {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 90vw;
            max-width: 728px;
            height: 90px;
            z-index: 25;
        }

        /* Responsive Layout Overrides */
        @media (max-width: 1150px) {
            .ad-vertical { display: none !important; }
        }
        @media (min-width: 1151px) {
            .ad-mobile-top { display: none !important; }
        }

        /* Typography Styling */
        h1 {
            font-family: var(--font-serif);
            font-size: 2.25rem;
            font-weight: 400;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            color: hsl(var(--foreground));
        }

        p {
            font-size: 0.875rem;
            color: hsl(var(--muted-foreground));
            line-height: 1.6;
            margin-bottom: 32px;
            letter-spacing: 0.01em;
        }

        /* Buttons Styling */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            height: 40px;
            padding: 0 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            background-color: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            border: 1px solid hsl(var(--primary));
            font-family: var(--font-sans);
        }
        
        .btn-primary:hover { 
            background-color: transparent;
            color: hsl(var(--primary));
        }

        /* --- FLOATING REDIRECT FOOTER DRAWER --- */
        .floating-footer-drawer {
            position: fixed;
            bottom: 145px; 
            right: 24px;
            z-index: 40;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }

        /* --- SHADCN SERA PROGRESS BAR --- */
        .progress-bar-container {
            width: 140px;
            height: 1px;
            background-color: hsl(var(--border));
            position: relative;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .progress-bar-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 100%;
            background-color: hsl(var(--primary));
            transform: translateX(-100%);
        }

        .progress-active { animation: load 5s linear forwards; }
        @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(0); } }

        /* --- PROJECTS CARD GRID STYLING --- */
        .projects-section {
            width: 100%;
            margin-top: 12px;
            text-align: left;
        }

        .project-card {
            display: flex;
            align-items: center;
            padding: 16px;
            background-color: hsl(var(--card));
            border: 1px solid hsl(var(--border));
            border-radius: var(--radius);
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s;
        }

        .project-card:hover { border-color: hsl(var(--primary)); }

        .project-img {
            width: 48px;
            height: 48px;
            border-radius: var(--radius);
            object-fit: cover;
            margin-right: 16px;
            border: 1px solid hsl(var(--border));
        }

        .project-details { flex-grow: 1; }
        .project-title { font-family: var(--font-serif); font-size: 1.1rem; margin-bottom: 2px; }
        .project-action {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: hsl(var(--muted-foreground));
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <script>NProgress.start();</script>

    <div id="ad-top-mobile" class="ad-container ad-horizontal ad-mobile-top">
        <ins class="adsbygoogle" style="display:block; width:100%; height:100%;" data-ad-format="horizontal" data-full-width-responsive="true"></ins>
    </div>

    <div id="ad-wrapper-left" class="ad-container ad-vertical ad-left">
        <ins class="adsbygoogle" style="display:block; width:100%; height:100%;" data-ad-format="vertical" data-full-width-responsive="true"></ins>
    </div>

    <div id="ad-wrapper-right" class="ad-container ad-vertical ad-right">
        <ins class="adsbygoogle" style="display:block; width:100%; height:100%;" data-ad-format="vertical" data-full-width-responsive="true"></ins>
    </div>

    <div id="page-view-wrapper">
        
        <div class="header-bar">
            <iframe src="https://ghbtns.com/github-btn.html?user=thelectrowizard&repo=thelectrowizard.github.io&type=star&count=true&size=medium" 
                    frameborder="0" scrolling="0" width="120" height="20" title="GitHub Star">
            </iframe>
        </div>

        <h1 id="main-heading">Loading</h1>
        <p id="sub-heading">Checking reference fields...</p>
        
        <div class="progress-bar-container" id="progress-container">
            <div class="progress-bar-fill" id="progress-bar"></div>
        </div>

        <div id="projects-inline-panel" class="projects-section hidden">
            <a href="https://myarcade.pages.dev" class="project-card">
                <img src="https://myarcade.pages.dev/joystick.svg" alt="Arcade Logo" class="project-img">
                <div class="project-details">
                    <div class="project-title">Arcade</div>
                    <div class="project-action">View &#x2197;</div>
                </div>
            </a>
        </div>
    </div>

    <div id="floating-redirect-module" class="floating-footer-drawer hidden">
        <button id="floating-fallback-btn" class="btn-primary hidden" style="margin-bottom:4px;">Continue Manually</button>
        <button id="floating-toggle-projects" class="btn-primary" style="opacity:0.9;">View Other Projects</button>
    </div>

    <div id="ad-wrapper-bottom" class="ad-container ad-bottom-sticky">
        <ins class="adsbygoogle" style="display:block; width:100%; height:100%;" data-ad-format="horizontal" data-full-width-responsive="true"></ins>
    </div>

    <script type="module">
        import config from 'https://myarcade.pages.dev/config.js';

        if (config && config.siteId && config.siteId !== "placeholder") {
            document.querySelectorAll('.ad-container').forEach(el => {
                el.style.display = 'block';
            });

            const script = document.createElement('script');
            script.async = true;
            script.src = `https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${config.siteId}`;
            script.crossOrigin = "anonymous";
            document.head.appendChild(script);

            const ads = document.querySelectorAll('.adsbygoogle');
            ads.forEach(ad => {
                ad.setAttribute('data-ad-client', config.siteId);
                (window.adsbygoogle = window.adsbygoogle || []).push({});
            });
        }
        // Conclude NProgress trace upon full module dependency assembly
        NProgress.done();
    </script>

    <script>
        let destination = "https://myarcade.pages.dev";
        let isRedirectMode = false;

        function triggerFadeExit(targetUrl) {
            document.getElementById('page-view-wrapper').classList.add('fade-out');
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 280);
        }

        // Action function to preload raw code document footprint without loading media weights
        function preloadTargetDocument(url) {
            NProgress.start();
            const prefetchLink = document.createElement('link');
            prefetchLink.rel = 'prefetch';
            prefetchLink.as = 'document';
            prefetchLink.href = url;
            document.head.appendChild(prefetchLink);
        }

        document.addEventListener("DOMContentLoaded", () => {
            const referrer = document.referrer;
            const heading = document.getElementById('main-heading');
            const subHeading = document.getElementById('sub-heading');
            const progressBar = document.getElementById('progress-bar');
            const progressContainer = document.getElementById('progress-container');
            const inlineProjects = document.getElementById('projects-inline-panel');
            const floatingModule = document.getElementById('floating-redirect-module');
            const fallbackBtn = document.getElementById('floating-fallback-btn');

            if (referrer) {
                try {
                    const refUrl = new URL(referrer);
                    const host = refUrl.hostname;

                    if (host === 'myarcade.pages.dev' || host.endsWith('.myarcade.pages.dev')) {
                        isRedirectMode = true;
                        let cleanPath = refUrl.pathname;
                        if (cleanPath.endsWith('/page')) {
                            cleanPath = cleanPath.slice(0, -5);
                        }
                        destination = refUrl.origin + cleanPath + refUrl.search + refUrl.hash;
                    }
                } catch (e) {
                    console.error("Referrer structural parse mismatch:", e);
                }
            }

            if (isRedirectMode) {
                // --- SCENARIO A: Target matches origin referrer rules ---
                heading.textContent = "Redirecting to the Arcade";
                subHeading.textContent = "Loading ...";
                progressBar.classList.add('progress-active');
                floatingModule.classList.remove('hidden');

                setTimeout(() => { triggerFadeExit(destination); }, 5000);
                setTimeout(() => { 
                    if(fallbackBtn) {
                        fallbackBtn.classList.remove('hidden');
                        // Preload document text tree 1s before manual activation threshold limit
                        preloadTargetDocument(destination);
                    }
                }, 7000);

                setTimeout(() => {
                    if(fallbackBtn) fallbackBtn.classList.remove('hidden');
                }, 8000);

            } else {
                // --- SCENARIO B: External Landing visit path -> Display Default Projects list instantly ---
                heading.textContent = "My Projects";
                subHeading.textContent = "Welcome! Explore my featured creations below.";
                progressContainer.classList.add('hidden');
                inlineProjects.classList.remove('hidden');
            }

            // Click intercept rule to clean page and strip referrers to land gracefully onto defaults
            document.getElementById('floating-toggle-projects').addEventListener('click', function(e) {
                e.preventDefault();
                // Rewrites page location reference directly to scrub standard document.referrer chains
                window.location.replace(window.location.origin + window.location.pathname);
            });

            if(fallbackBtn) {
                fallbackBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    triggerFadeExit(destination);
                });
            }
        });

        window.addEventListener('load', () => { NProgress.done(); });
    </script>
</body>
</html>
