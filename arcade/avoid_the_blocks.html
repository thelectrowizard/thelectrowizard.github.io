<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avoid The Blocks</title>
    
    <script src="global-nav.js" defer></script>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="74562084-62cf-4203-9e47-1b4fa0d1ecbf"></script>

    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #111111;
            --text-secondary: #767676;
            --border-light: #eaeaea;
            --border-dark: #111111;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: var(--bg-color);
            overflow: hidden;
        }
        
        #game-canvas {
            display: block;
            background-color: var(--bg-color);
        }
        
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            padding: 24px;
            display: flex;
            justify-content: space-between;
        }
        
        .hud-card {
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: var(--text-primary);
        }
        
        #start-screen, #game-over, #level-select {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
            z-index: 20;
            text-align: center;
            padding: 20px;
            opacity: 0;
            transform: translateY(-10px);
            animation: fadeInDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        #game-over, #level-select {
            display: none;
        }

        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        
        h2 {
            font-size: 1.3rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
            color: var(--text-primary);
        }
        
        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .instructions {
            margin-bottom: 32px;
            max-width: 340px;
        }

        .instructions p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 8px;
        }
        
        .key {
            display: inline-block;
            border: 1px solid var(--border-light);
            padding: 1px 6px;
            font-size: 0.8rem;
            color: var(--text-primary);
        }
        
        .btn {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-dark);
            padding: 10px 24px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 6px;
            width: 180px;
            text-decoration: none;
        }
        
        .btn:hover {
            background: var(--text-primary);
            color: var(--bg-color);
        }

        .btn-secondary {
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            border-color: var(--border-dark);
            background: transparent;
            color: var(--text-primary);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            max-width: 320px;
            width: 100%;
            margin-bottom: 40px;
        }

        .stat-box {
            text-align: center;
        }

        .stat-box .label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .stat-box .value {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .level-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 240px;
            margin-bottom: 32px;
        }
        
        .level-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-light);
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }
        
        .level-btn:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }
        
        .level-btn.active {
            border-color: var(--text-primary);
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .difficulty-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
            width: 200px;
        }
        
        .slider-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            letter-spacing: 0.02em;
        }
        
        #difficulty-slider {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 2px;
            background: var(--border-light);
            outline: none;
            margin-bottom: 12px;
        }

        #difficulty-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            background: var(--text-primary);
            cursor: pointer;
        }
        
        #difficulty-value {
            font-size: 0.8rem;
            color: var(--text-primary);
        }
        
        #touch-controls {
            position: absolute;
            bottom: 24px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 15;
            pointer-events: none;
        }
        
        .control-btn {
            width: 44px;
            height: 44px;
            border: 1px solid var(--border-light);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            color: var(--text-secondary);
            user-select: none;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .control-btn:active {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }
        
        #back-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            padding: 6px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            z-index: 25;
            transition: all 0.2s ease;
        }
        
        #back-btn:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            width: 100%;
            text-align: center;
            z-index: 30;
            pointer-events: none;
        }
        footer a {
            pointer-events: auto;
            color: var(--text-primary);
            text-decoration: underline;
            text-underline-offset: 3px;
        }
    </style>
</head>
