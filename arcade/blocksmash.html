<html lang="en">
<head>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="74562084-62cf-4203-9e47-1b4fa0d1ecbf"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlockSmasher</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #111111;
            --text-secondary: #767676;
            --border-color: #eaeaea;
            --grid-line: #f5f5f5;
            --block-fill: #111111;
            --block-preview: rgba(17, 17, 17, 0.08);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        [data-theme="terminal"] {
            --bg-color: #050505;
            --text-primary: #00ff66;
            --text-secondary: #008833;
            --border-color: #00ff66;
            --grid-line: #112211;
            --block-fill: #00ff66;
            --block-preview: rgba(0, 255, 102, 0.1);
            --font-family: "Courier New", Courier, monospace;
        }

        [data-theme="dark"] {
            --bg-color: #111111;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --border-color: #333333;
            --grid-line: #222222;
            --block-fill: #ffffff;
            --block-preview: rgba(255, 255, 255, 0.1);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        [data-theme="party"] {
            --bg-color: #0c0014;
            --text-primary: #ff00ff;
            --text-secondary: #8a2be2;
            --border-color: #ff00ff;
            --grid-line: #240038;
            --block-fill: #ffd700;
            --block-preview: rgba(255, 0, 255, 0.15);
            --font-family: sans-serif;
        }

        [data-theme="beach"] {
            --bg-color: #e0f7fa;
            --text-primary: #006064;
            --text-secondary: #0097a7;
            --border-color: #00838f;
            --grid-line: #b2ebf2;
            --block-fill: #ff7043;
            --block-preview: rgba(0, 151, 167, 0.15);
            --font-family: sans-serif;
        }

        [data-theme="laser"] {
            --bg-color: #000a12;
            --text-primary: #00e5ff;
            --text-secondary: #00838f;
            --border-color: #00e5ff;
            --grid-line: #002233;
            --block-fill: #00e676;
            --block-preview: rgba(0, 229, 255, 0.15);
            --font-family: monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }

        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 10;
            background: var(--bg-color);
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-nav {
            font-size: 0.8rem;
            letter-spacing: -0.01em;
            text-decoration: none;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            text-transform: lowercase;
            transition: all 0.2s ease;
        }

        .back-nav:hover {
            color: var(--text-primary);
            border-color: var(--text-primary);
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: -0.04em;
            text-transform: lowercase;
        }

        .score-board {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }

        #gameWrapper {
            position: absolute;
            top: 60px;
            bottom: 60px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        #canvasContainer {
            position: relative;
            width: 100%;
            max-width: 440px;
            aspect-ratio: 1 / 1.4;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: pointer;
        }

        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 10;
            background: var(--bg-color);
        }

        .instructions {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .theme-selector {
            display: flex;
            gap: 6px;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            overflow-x: auto;
            max-width: 60%;
            white-space: nowrap;
            padding: 4px 0;
        }

        .theme-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 4px 8px;
            font-family: inherit;
            font-size: 0.75rem;
            cursor: pointer;
            text-transform: lowercase;
        }

        .theme-btn.active {
            color: var(--text-primary);
            border-color: var(--text-primary);
            font-weight: 500;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
            z-index: 15;
            text-align: center;
            padding: 24px;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay-message {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
            text-transform: lowercase;
            letter-spacing: -0.01em;
            line-height: 1.5;
        }

        .btn {
            background: var(--text-primary);
            color: var(--bg-color);
            border: 1px solid var(--text-primary);
            padding: 12px 28px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: -0.01em;
            text-transform: lowercase;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }
    </style>
</head>
