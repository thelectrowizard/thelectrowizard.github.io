<!DOCTYPE html>
<html lang="en" data-preset="sera-editorial">
<head>
    <link rel="icon" type="image/svg+xml" href="https://myarcade.pages.dev/joystick.svg">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="74562084-62cf-4203-9e47-1b4fa0d1ecbf"></script>
    <meta property="og:image" content="https://thelectrowizard.github.io/main.jpeg">
    <meta property="og:url" content="https://myarcade.pages.dev/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Arcade">
    <meta name="description" content="Avoid the Blocks • Avoid the Blocks V2 • GeoDash • Microracer • PokeGoLite">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade</title>
    <style>
        /* --- SHADCN OFFICIAL SERA (EDITORIAL STYLE) TOKENS --- */
        html[data-preset="sera-editorial"] {
            --background: 0 0% 100%;             /* Pure editorial paper white */
            --foreground: 240 10% 3.9%;          /* Deep ink black */
            --card: 0 0% 98%;                    /* Minimal off-white card background */
            --muted-foreground: 240 3.8% 46.1%;  /* Soft graphite gray for metadata */
            --border: 240 5.9% 90%;              /* Light hair-line rule border */
            --muted: 240 4.8% 95.9%;             /* Clean structural track layer */
            --primary: 240 5.9% 10%;             /* Rich black primary ink */
            --primary-foreground: 0 0% 98%;      /* Stark white foreground text */
            --radius: 0.125rem;                  /* Structural, sharp corners matching typography rules */
        }

        :root {
            /* Sera Style Typography Framework */
            --font-serif: "Playfair Display", "Georgia", "Times New Roman", serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            font-family: var(--font-sans);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 24px;
            text-align: center;
            -webkit-font-smoothing: antialiased;
            overflow: hidden; /* Prevents scrollbars from fixed ads */
        }

        /* --- ADVERTISEMENT STYLING --- */
        .ad-container {
            position: fixed;
            display: none; /* Hidden by default until config is checked */
            background-color: hsl(var(--card));
            border: 1px solid hsl(var(--border));
            border-radius: 10pt;
            overflow: hidden;
            font-family: var(--font-sans);
            z-index: 10;
        }

        /* Slim vertical ads (Skyscraper format) */
        .ad-vertical {
            top: 50%;
            transform: translateY(-50%);
            width: 160px;
            height: 600px;
            max-height: 80vh;
        }

        .ad-left {
            left: 24px;
        }

        .ad-right {
            right: 24px;
        }

        /* Bottom leaderboard ad */
        .ad-bottom {
            bottom: 60px; /* Sits cleanly above the footer */
            left: 50%;
            transform: translateX(-50%);
            width: 728px;
            max-width: 90vw;
            height: 90px;
        }

        /* Hide ads on small mobile screens to prevent overlapping content */
        @media (max-width: 1100px) {
            .ad-vertical { display: none !important; }
        }
        @media (max-height: 700px) {
            .ad-bottom { display: none !important; }
        }

        /* --- FLUID PAGE TRANSITIONS --- */
        .page-transition {
            opacity: 0;
            transform: translateY(-8px);
            animation: fadeInDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            z-index: 20;
        }

        .page-transition.fade-out {
            animation: fadeUpOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInDown {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUpOut {
            to { opacity: 0; transform: translateY(-8px); }
        }

        /* Sera Editorial Heading */
        h1 {
            font-family: var(--font-serif);
            font-size: 2.25rem;
            font-weight: 400;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            color: hsl(var(--foreground));
        }

        p {
            font-size: 0.875rem;
            color: hsl(var(--muted-foreground));
            line-height: 1.6;
            margin-bottom: 32px;
            letter-spacing: 0.01em;
        }

        /* --- SHADCN SERA BUTTON --- */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            height: 40px;
            padding: 0 24px;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
            text-decoration: none;
            background-color: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            border: 1px solid hsl(var(--primary));
            font-family: var(--font-sans);
            margin-top: 24px;
        }
        
        .btn-primary:hover { 
            background-color: transparent;
            color: hsl(var(--primary));
        }

        /* --- SHADCN SERA PROGRESS BAR --- */
        .progress-bar-container {
            width: 140px;
            height: 1px;
            background-color: hsl(var(--border));
            position: relative;
            overflow: hidden;
        }

        .progress-bar-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 100%;
            background-color: hsl(var(--primary));
            animation: load 5s linear forwards;
        }

        @keyframes load {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(0); }
        }

        footer {
            position: absolute;
            bottom: 24px;
            font-size: 0.75rem;
            color: hsl(var(--muted-foreground));
            letter-spacing: 0.02em;
            z-index: 20;
        }

        footer a {
            color: hsl(var(--foreground));
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid hsl(var(--border));
        }

        footer a:hover {
            border-bottom-color: hsl(var(--foreground));
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="ad-wrapper-left" class="ad-container ad-vertical ad-left">
        <ins class="adsbygoogle"
             style="display:block; width:100%; height:100%;"
             data-ad-format="vertical"
             data-full-width-responsive="true"></ins>
    </div>

    <div id="ad-wrapper-right" class="ad-container ad-vertical ad-right">
        <ins class="adsbygoogle"
             style="display:block; width:100%; height:100%;"
             data-ad-format="vertical"
             data-full-width-responsive="true"></ins>
    </div>

    <div id="ad-wrapper-bottom" class="ad-container ad-bottom">
        <ins class="adsbygoogle"
             style="display:block; width:100%; height:100%;"
             data-ad-format="horizontal"
             data-full-width-responsive="true"></ins>
    </div>

    <div class="page-transition" id="animated-content">
        <h1>Loading</h1>
        <p>Redirecting to the Arcade.</p>
        <div class="progress-bar-container">
            <div class="progress-bar-fill"></div>
        </div>
        
        <a href="redirect.html" id="fallback-btn" class="btn-primary nav-link hidden">Continue Manually</a>
    </div>

    <footer>
        Analytics by <a href="https://umami.is" target="_blank" rel="noopener">Umami</a> &bull; Hosting by <a href="https://pages.cloudflare.com" target="_blank" rel="noopener">Cloudflare Pages</a>
    </footer>

    <script type="module">
        // Import your config file. 
        // Note: Ensure your config.js exports the object, e.g.: `export default { siteId: "..." };`
        // If it's a standard script setting a global variable instead, replace the import with `const config = window.yourConfigVar;`
        import config from './config.js';

        if (config && config.siteId && config.siteId !== "placeholder") {
            // 1. Show the ad containers
            document.querySelectorAll('.ad-container').forEach(el => {
                el.style.display = 'block';
            });

            // 2. Inject the Google Ads library dynamically
            const script = document.createElement('script');
            script.async = true;
            script.src = `https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${config.siteId}`;
            script.crossOrigin = "anonymous";
            document.head.appendChild(script);

            // 3. Initialize the ads and attach the siteId
            const ads = document.querySelectorAll('.adsbygoogle');
            ads.forEach(ad => {
                ad.setAttribute('data-ad-client', config.siteId);
                (window.adsbygoogle = window.adsbygoogle || []).push({});
            });
        }
    </script>

    <script>
        const destination = "https://myarcade.pages.dev";

        function leavePage(target) {
            document.getElementById('animated-content').classList.add('fade-out');
            setTimeout(() => {
                window.location.href = target;
            }, 280);
        }

        // Automatic redirection after progress completes (5 seconds)
        setTimeout(() => {
            leavePage(destination);
        }, 5000);

        // Reveal the uppercase structural manual button 3 seconds later (8s total)
        setTimeout(() => {
            const btn = document.getElementById('fallback-btn');
            if (btn) {
                btn.classList.remove('hidden');
            }
        }, 8000);

        // Intercept user manual click execution
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                leavePage(destination);
            });
        });
    </script>
</body>
</html>
