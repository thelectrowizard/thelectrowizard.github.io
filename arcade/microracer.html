    <meta charset="UTF-8">

    <title>Micro Racer</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --gray: #767676;
            --light-gray: #f0f0f0;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            user-select: none;
        }
        #ui-container {
            width: 800px;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--text);
            padding-bottom: 8px;
        }
        h1 {
            font-size: 1.2rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }
        .controls-panel {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        select, button {
            background: var(--bg);
            border: 2px solid var(--text);
            color: var(--text);
            padding: 6px 12px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }
        select:hover, button:hover {
            background: var(--text);
            color: var(--bg);
        }
        button:disabled {
            border-color: var(--gray);
            color: var(--gray);
            cursor: not-allowed;
            background: transparent;
        }
        #gameCanvas {
            border: 2px solid var(--text);
            background: #ffffff;
            width: 800px;
            height: 500px;
            display: block;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .instructions {
            font-size: 0.8rem;
            color: var(--gray);
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
