    <style>
        :root {
            /* Color Variables */
            --bg-color: #FFFFFF;
            --text-primary: #111111;
            --text-secondary: #767676;
            --divider-color: #EAEAEA;
            --content-divider: #111111;
            
            /* Typography Variables */
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --h1-size: 2.5rem;
            --h2-size: 1.5rem;
            --body-size: 0.95rem;
            
            /* Spacing Variables */
            --section-gap: 60px;
            --module-padding: 30px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            line-height: 1.5;
            padding: 20px;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Transition States */
        .page-transition {
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page-transition.fade-out {
            animation: fadeUpOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUpOut {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        /* Corner Profile Trigger Style Using SVG */
        .corner-profile-btn {
            position: fixed;
            top: 24px;
            right: 24px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s ease;
        }

        .corner-profile-btn:hover {
            opacity: 0.7;
        }

        .corner-profile-btn img {
            width: 32px;
            height: 32px;
            display: block;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 80px auto 40px auto;
            text-align: center;
        }

        .page-title {
            font-size: var(--h1-size);
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .page-meta-info {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: var(--section-gap);
        }

        .star-link-badge {
            color: var(--text-secondary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
            transition: color 0.2s ease;
        }

        .star-link-badge:hover {
            color: var(--text-primary);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .game-module {
            margin-bottom: var(--section-gap);
            padding: var(--module-padding) 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-module:last-child {
            margin-bottom: 0;
        }

        .game-image {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 4px;
            margin-bottom: 20px;
            object-fit: cover;
            border: 1px solid var(--divider-color);
        }

        .game-title {
            font-size: var(--h2-size);
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .game-description {
            font-size: var(--body-size);
            color: var(--text-secondary);
            margin-bottom: 24px;
            max-width: 450px;
        }

        .content-divider {
            height: 1px;
            width: 40px;
            background-color: var(--divider-color);
            margin: 16px 0;
        }

        .action-controls {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        /* Keyboard Verification Field Wrapper */
        .keyboard-verification-field {
            font-family: var(--font-family);
            font-size: 0.95rem;
            color: var(--text-primary);
            background-color: #FAFAFA;
            border: 1px dashed var(--text-primary);
            padding: 12px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            max-width: 400px;
            width: 100%;
            animation: fadeInDown 0.3s ease forwards;
        }

        .keyboard-hint {
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        /* Minimalist Buttons */
        .control-button {
            display: inline-block;
            background-color: var(--text-primary);
            color: #FFFFFF;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            padding: 10px 24px;
            border: none;
            cursor: pointer;
            font-family: var(--font-family);
            transition: background-color 0.2s ease;
            text-align: center;
        }

        .control-button:hover {
            background-color: var(--text-secondary);
        }

        .control-button.secondary-action {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--text-primary);
            margin-left: 12px;
        }

        .control-button.secondary-action:hover {
            background-color: #FAFAFA;
            color: var(--text-primary);
        }

        .control-button:disabled {
            background-color: #CCCCCC !important;
            color: #888888 !important;
            border: none !important;
            cursor: not-allowed !important;
        }

        .module-separator {
            height: 1px;
            width: 100%;
            max-width: 200px;
            background-color: var(--divider-color);
            margin: 20px auto;
        }

        /* Footer Attribution */
        footer {
            margin-top: auto;
            padding: 40px 0 20px 0;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
        }

        footer a {
            color: var(--text-primary);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        footer a:hover {
            color: var(--text-secondary);
        }

        /* Fullscreen Overlays */
        .profile-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            z-index: 200;
            overflow-y: auto;
            padding: 40px 20px;
        }

        .profile-container {
            width: 100%;
            max-width: 400px;
            margin: 40px auto;
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 24px;
        }

        .profile-heading {
            font-size: 1.3rem;
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        .profile-form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
            text-align: left;
        }

        .profile-form-group label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: lowercase;
            letter-spacing: 0.2px;
        }

        .minimal-input {
            width: 100%;
            padding: 10px 0;
            font-size: 0.95rem;
            color: var(--text-primary);
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--divider-color);
            font-family: var(--font-family);
            outline: none;
            transition: border-color 0.2s ease;
        }

        .minimal-input:focus {
            border-bottom-color: var(--text-primary);
        }

        .sync-block {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sync-status-msg {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .short-code-display {
            font-family: monospace;
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: 6px;
            text-align: center;
            padding: 16px;
            background: #FAFAFA;
            border: 1px solid var(--divider-color);
            color: var(--text-primary);
        }

        .inline-controls {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            justify-content: center;
        }

        .auth-progress-container {
            width: 100%;
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }

        .progress-bar {
            width: 40px;
            height: 2px;
            background-color: #EAEAEA;
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 100%;
            background-color: var(--text-primary);
            animation: load 1s linear forwards;
        }

        @keyframes load {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(0); }
        }

        .hidden {
            display: none !important;
        }

        @media screen and (max-width: 480px) {
            :root {
                --h1-size: 2rem;
                --h2-size: 1.25rem;
                --section-gap: 40px;
                --module-padding: 20px;
            }
            
            body {
                padding: 16px;
            }
            
            .corner-profile-btn {
                position: absolute;
                top: 20px;
                right: 16px;
            }
            
            .container {
                margin-top: 60px;
            }
            
            .action-controls, .inline-controls {
                flex-direction: column;
                gap: 8px;
                width: 100%;
            }
            
            .control-button {
                width: 100%;
            }
            
            .control-button.secondary-action {
                margin-left: 0;
            }

            .profile-overlay {
                padding: 24px 16px;
            }
        }
    </style>
</head>
