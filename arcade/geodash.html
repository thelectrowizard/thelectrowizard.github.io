<!DOCTYPE html>
<html lang="en">
<head>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="74562084-62cf-4203-9e47-1b4fa0d1ecbf"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoDash</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #111111;
            --text-secondary: #767676;
            --border-color: #eaeaea;
            --invert-filter: invert(0);
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            filter: var(--invert-filter);
            transition: filter 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            animation: fadeInPage 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes fadeInPage {
            0% { opacity: 0; transform: translateY(-40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Top Bar Layout */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 10;
            background: var(--bg-color);
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-nav {
            font-size: 0.8rem;
            letter-spacing: -0.01em;
            text-decoration: none;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            text-transform: lowercase;
            transition: all 0.2s ease;
        }

        .back-nav:hover {
            color: var(--text-primary);
            border-color: var(--text-primary);
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: -0.04em;
            margin: 0;
            text-transform: lowercase;
        }

        .score-board {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }

        /* Bottom Bar Layout */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 10;
            background: var(--bg-color);
        }

        .instructions {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        /* Minimalist Square Slider */
        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            background: transparent;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: var(--border-color);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            background: var(--text-primary);
            cursor: pointer;
            margin-top: -6px;
            border-radius: 0;
        }

        input[type="range"]::-moz-range-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: var(--border-color);
        }

        input[type="range"]::-moz-range-thumb {
            height: 16px;
            width: 16px;
            background: var(--text-primary);
            cursor: pointer;
            border-radius: 0;
            border: none;
        }

        /* Game Canvas Shell */
        #gameWrapper {
            position: absolute;
            top: 60px;
            bottom: 60px;
            left: 0;
            width: 100%;
            background: var(--bg-color);
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            transition: opacity 0.3s ease;
            z-index: 5;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-message {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
            text-transform: lowercase;
            letter-spacing: -0.01em;
            display: none;
            text-align: center;
        }

        .btn {
            background: var(--text-primary);
            color: var(--bg-color);
            border: none;
            padding: 12px 28px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s ease;
            letter-spacing: -0.01em;
        }

        .btn:hover {
            opacity: 0.8;
        }

        #tutorialMessage {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: var(--text-primary);
            text-transform: lowercase;
            text-align: center;
            z-index: 4;
            pointer-events: none;
            background: var(--bg-color);
            padding: 8px 20px;
            border: 1px solid var(--border-color);
            display: none;
            max-width: 80%;
        }
    </style>
</head>
